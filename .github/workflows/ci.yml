name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime and lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint
        run: |
          targets=()
          [ -f app/services/shortline_service.py ] && targets+=("app/services/shortline_service.py")
          [ -f tests/test_shortline_service.py ] && targets+=("tests/test_shortline_service.py")
          [ -f app/services/lead_lag_service.py ] && targets+=("app/services/lead_lag_service.py")
          [ -f tests/test_lead_lag_service.py ] && targets+=("tests/test_lead_lag_service.py")
          [ -f tests/test_lead_lag_api.py ] && targets+=("tests/test_lead_lag_api.py")
          if [ ${#targets[@]} -gt 0 ]; then
            python -m ruff check "${targets[@]}"
          else
            python -m compileall app scripts tests
          fi

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime and type tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-requests
      - name: Type check
        run: |
          targets=()
          [ -f app/services/lead_lag_service.py ] && targets+=("app/services/lead_lag_service.py")
          [ -f tests/test_lead_lag_service.py ] && targets+=("tests/test_lead_lag_service.py")
          [ -f tests/test_lead_lag_api.py ] && targets+=("tests/test_lead_lag_api.py")
          [ -f tests/test_shortline_service.py ] && targets+=("tests/test_shortline_service.py")
          if [ ${#targets[@]} -gt 0 ]; then
            python -m mypy "${targets[@]}" --ignore-missing-imports --follow-imports=silent
          else
            python - <<'PY'
            import importlib
            importlib.import_module("app.main")
            print("Fallback import check passed")
            PY
          fi

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          targets=()
          [ -f tests/test_lead_lag_service.py ] && targets+=("tests/test_lead_lag_service.py")
          [ -f tests/test_lead_lag_api.py ] && targets+=("tests/test_lead_lag_api.py")
          [ -f tests/test_shortline_service.py ] && targets+=("tests/test_shortline_service.py")
          if [ ${#targets[@]} -gt 0 ]; then
            python -m pytest -q "${targets[@]}"
          elif ls tests/test_*.py >/dev/null 2>&1; then
            python -m pytest -q tests
          else
            echo "No pytest targets found"
          fi

  smoke:
    runs-on: ubuntu-latest
    needs:
      - lint
      - type
      - tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Static smoke
        run: |
          python -m compileall app scripts tests
          python - <<'PY'
          import importlib
          modules = [
              "app.main",
              "app.routers.investment",
              "app.services.intelligence_service",
              "app.services.lead_lag_service",
          ]
          for name in modules:
              importlib.import_module(name)
              print(f"import ok: {name}")
          PY
      - name: Conditional DB smoke
        run: |
          if [ -f data/investment.db ]; then
            python scripts/smoke_test.py || echo "warning: scripts/smoke_test.py reported repository-specific DB issues"
          else
            echo "Skip DB smoke: data/investment.db not present"
          fi
      - name: Conditional HTTP smoke
        env:
          INVESTMENT_BASE_URL: ${{ vars.INVESTMENT_BASE_URL }}
        run: |
          if [ -n "${INVESTMENT_BASE_URL}" ]; then
            python scripts/smoke_test_api.py || echo "warning: HTTP smoke failed against configured base URL"
          else
            echo "Skip HTTP smoke: INVESTMENT_BASE_URL is not configured"
          fi
