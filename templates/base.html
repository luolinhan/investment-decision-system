<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}研报中心{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">

    <script>
        (function () {
            const key = 'investment-ui-theme';
            const systemTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
            let theme = systemTheme;
            try {
                const stored = localStorage.getItem(key);
                if (stored === 'dark' || stored === 'light') {
                    theme = stored;
                }
            } catch (error) {
                // Ignore storage errors and fallback to system theme.
            }
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.style.colorScheme = theme;
        })();
    </script>

    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.8);
            --bg-card-hover: rgba(30, 41, 59, 0.9);
            --border-color: rgba(56, 189, 248, 0.1);
            --border-glow: rgba(56, 189, 248, 0.3);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-cyan: #38bdf8;
            --accent-cyan-dim: rgba(56, 189, 248, 0.15);
            --accent-green: #22c55e;
            --accent-gold: #fbbf24;
            --accent-red: #ef4444;
            --accent-purple: #a78bfa;
            --font-display: 'Space Grotesk', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --sidebar-width: 280px;
            --transition-fast: 0.15s ease;
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --bg-orb-1: rgba(56, 189, 248, 0.08);
            --bg-orb-2: rgba(139, 92, 246, 0.06);
            --bg-orb-3: rgba(34, 197, 94, 0.04);
            --text-on-accent: #0f172a;
            --shadow-elevated: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        html[data-theme="light"] {
            --bg-primary: #f7fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.88);
            --bg-card-hover: rgba(241, 245, 249, 0.95);
            --border-color: rgba(15, 23, 42, 0.12);
            --border-glow: rgba(14, 165, 233, 0.32);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --accent-cyan: #0284c7;
            --accent-cyan-dim: rgba(2, 132, 199, 0.12);
            --accent-purple: #7c3aed;
            --bg-orb-1: rgba(14, 165, 233, 0.08);
            --bg-orb-2: rgba(124, 58, 237, 0.06);
            --bg-orb-3: rgba(34, 197, 94, 0.05);
            --text-on-accent: #ffffff;
            --shadow-elevated: 0 10px 35px rgba(15, 23, 42, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-display);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, var(--bg-orb-1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, var(--bg-orb-2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, var(--bg-orb-3) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-nav {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding-right: 0.35rem;
            margin-right: -0.35rem;
        }

        .sidebar-footer {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .sidebar-footer-title {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
        }

        .sidebar-runtime {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .logo {
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .tagline {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 0.25rem;
        }

        .nav-section {
            margin-bottom: 1rem;
        }

        .nav-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            padding-left: 0.75rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.875rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 0.75rem;
            margin-bottom: 0.25rem;
            transition: var(--transition-fast);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--accent-cyan-dim);
        }

        .nav-link.active {
            color: var(--accent-cyan);
            background: var(--accent-cyan-dim);
            box-shadow: inset 0 0 0 1px var(--border-glow);
        }

        .nav-link i {
            font-size: 1.1rem;
            width: 1.25rem;
            text-align: center;
        }

        .nav-badge {
            margin-left: auto;
            background: var(--accent-cyan);
            color: var(--text-on-accent);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 1rem;
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 2rem 2.5rem;
            min-height: 100vh;
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: 0.625rem;
            font-family: var(--font-display);
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition-fast);
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), #0ea5e9);
            color: var(--text-on-accent);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-glow);
        }

        .btn-icon {
            padding: 0.75rem;
            border-radius: 0.625rem;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            backdrop-filter: blur(10px);
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .card:hover {
            border-color: var(--border-glow);
        }

        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .card-header i {
            margin-right: 0.5rem;
            color: var(--accent-cyan);
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Stat Cards Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .stat-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-2px);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        .stat-icon.cyan { background: var(--accent-cyan-dim); color: var(--accent-cyan); }
        .stat-icon.green { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
        .stat-icon.gold { background: rgba(251, 191, 36, 0.15); color: var(--accent-gold); }
        .stat-icon.purple { background: rgba(167, 139, 250, 0.15); color: var(--accent-purple); }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: var(--font-mono);
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-trend {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
        }

        .stat-trend.up { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
        .stat-trend.down { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }

        /* Report Cards */
        .report-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.875rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .report-card::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-cyan);
            transform: scaleY(0);
            transition: var(--transition-smooth);
        }

        .report-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-glow);
        }

        .report-card:hover::after {
            transform: scaleY(1);
        }

        .report-title {
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .report-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .report-meta span {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
        }

        .report-meta i {
            font-size: 0.9em;
            opacity: 0.7;
        }

        /* Rating Badges */
        .badge-rating {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .badge-rating.buy {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .badge-rating.hold {
            background: rgba(251, 191, 36, 0.15);
            color: var(--accent-gold);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .badge-rating.sell {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Filter Panel */
        .filter-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .filter-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
            gap: 1rem;
            align-items: end;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.625rem;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 0.875rem;
            transition: var(--transition-fast);
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px var(--accent-cyan-dim);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .page-link {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 2.5rem;
            height: 2.5rem;
            padding: 0 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition-fast);
            text-decoration: none;
        }

        .page-link:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-glow);
            color: var(--text-primary);
        }

        .page-link.active {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
            color: var(--text-on-accent);
            font-weight: 600;
        }

        .page-link.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-elevated);
        }

        .theme-toggle {
            margin-top: 0.9rem;
            width: 100%;
            justify-content: center;
            font-weight: 600;
            min-height: 2.9rem;
        }

        .theme-toggle i {
            font-size: 1rem;
        }

        .theme-toggle span {
            font-size: 0.8rem;
        }

        .toast.success { border-left: 3px solid var(--accent-green); }
        .toast.error { border-left: 3px solid var(--accent-red); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1rem;
            }

            .sidebar-nav {
                overflow: visible;
                padding-right: 0;
                margin-right: 0;
            }

            .main-content {
                margin-left: 0;
                padding: 1.5rem;
            }

            .stats-grid { grid-template-columns: 1fr; }
            .filter-row { grid-template-columns: 1fr; }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <h1><i class="bi bi-bar-chart-line-fill me-2"></i>Investment Hub</h1>
            <div class="tagline">Windows Local</div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">日常执行</div>
                <a class="nav-link {% if request.url.path == '/investment/' %}active{% endif %}" href="/investment/" style="border: 1px solid var(--border-glow);">
                    <i class="bi bi-clipboard2-pulse"></i>
                    <span>每日执行</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">研究</div>
                <a class="nav-link {% if request.url.path == '/investment/research' %}active{% endif %}" href="/investment/research">
                    <i class="bi bi-globe-americas"></i>
                    <span>研究与情报</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">诊断</div>
                <a class="nav-link {% if request.url.path == '/investment/data' %}active{% endif %}" href="/investment/data">
                    <i class="bi bi-database-check"></i>
                    <span>数据状态</span>
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-runtime">
                <i class="bi bi-pc-display-horizontal"></i>
                <span>Windows 本地数据与存储</span>
            </div>
            <div class="sidebar-footer-title">界面主题</div>
            <button id="themeToggle" class="btn btn-secondary theme-toggle" type="button" aria-label="切换主题">
                <i id="themeToggleIcon" class="bi bi-moon-stars"></i>
                <span id="themeToggleText">切换主题</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        const THEME_STORAGE_KEY = 'investment-ui-theme';
        const THEME_SET = new Set(['light', 'dark']);

        function getSystemTheme() {
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
        }

        function getStoredTheme() {
            try {
                const stored = localStorage.getItem(THEME_STORAGE_KEY);
                return THEME_SET.has(stored) ? stored : null;
            } catch (error) {
                return null;
            }
        }

        function updateThemeToggleUI(theme) {
            const btn = document.getElementById('themeToggle');
            const icon = document.getElementById('themeToggleIcon');
            const text = document.getElementById('themeToggleText');
            if (!btn || !icon || !text) return;
            const isDark = theme === 'dark';
            icon.className = `bi ${isDark ? 'bi-sun' : 'bi-moon-stars'}`;
            text.textContent = isDark ? '切到白天' : '切到暗黑';
            btn.setAttribute('aria-pressed', String(isDark));
        }

        function applyTheme(theme, options = {}) {
            const normalized = THEME_SET.has(theme) ? theme : getSystemTheme();
            const persist = options.persist !== false;
            document.documentElement.setAttribute('data-theme', normalized);
            document.documentElement.style.colorScheme = normalized;
            updateThemeToggleUI(normalized);
            if (persist) {
                try {
                    localStorage.setItem(THEME_STORAGE_KEY, normalized);
                } catch (error) {
                    // Ignore storage errors.
                }
            }
            document.dispatchEvent(new CustomEvent('app:theme-changed', { detail: { theme: normalized } }));
            return normalized;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const initialTheme = document.documentElement.getAttribute('data-theme') || getStoredTheme() || getSystemTheme();
            applyTheme(initialTheme, { persist: false });
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const current = document.documentElement.getAttribute('data-theme') || getSystemTheme();
                    applyTheme(current === 'dark' ? 'light' : 'dark');
                });
            }
        });

        // Format date
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        function formatFullDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        // API wrapper
        async function api(url, options = {}) {
            const defaultOptions = {
                headers: { 'Content-Type': 'application/json' }
            };
            const response = await fetch(url, { ...defaultOptions, ...options });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Get rating class
        function getRatingClass(rating) {
            if (!rating) return '';
            const r = rating.toLowerCase();
            if (r.includes('买入') || r.includes('buy') || r.includes('增持')) return 'buy';
            if (r.includes('卖出') || r.includes('sell') || r.includes('减持')) return 'sell';
            return 'hold';
        }

        // Animate number
        function animateNumber(element, target, duration = 500) {
            const start = 0;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (target - start) * easeOut);
                element.textContent = current.toLocaleString();

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
