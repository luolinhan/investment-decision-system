{% extends "base.html" %}

{% block title %}研究工作台 - 研报中心{% endblock %}

{% block content %}
<div class="workbench-header">
    <div>
        <h1 class="page-title">研究工作台</h1>
        <p class="page-subtitle">整合研究证据与内容仪表盘</p>
    </div>
    <div class="workbench-actions">
        <button class="btn btn-icon" onclick="toggleFilters()">
            <i class="bi bi-sliders"></i>
        </button>
        <button class="btn btn-primary" type="button">
            <i class="bi bi-arrow-clockwise"></i>
            <span>刷新</span>
        </button>
    </div>
</div>

<!-- Filters -->
<div class="filter-bar fade-in" id="filterBar" style="display: none;">
    <div class="filter-section">
        <label class="filter-label">重点领域</label>
        <div class="filter-tags">
            <button class="filter-tag active" data-key="all">
                <i class="bi bi-filter-circle-fill"></i> 全部
            </button>
            <button class="filter-tag" data-key="chip">
                <i class="bi bi-microchip"></i> 芯片/半导体
            </button>
            <button class="filter-tag" data-key="ai">
                <i class="bi bi-brain"></i> AI
            </button>
            <button class="filter-tag" data-key="robot">
                <i class="bi bi-robot"></i> 机器人
            </button>
            <button class="filter-tag" data-key="biopharma">
                <i class="bi bi-capsule"></i> 创新药
            </button>
            <button class="filter-tag" data-key="solar">
                <i class="bi bi-brightness-high"></i> 光伏
            </button>
            <button class="filter-tag" data-key="nuclear">
                <i class="bi bi-radioactive"></i> 核电
            </button>
            <button class="filter-tag" data-key="agri">
                <i class="bi bi-piggy-bank"></i> 养猪
            </button>
        </div>
    </div>
    <div class="filter-section">
        <label class="filter-label">属性</label>
        <div class="filter-toggles">
            <label class="toggle-switch">
                <input type="checkbox" id="filterDomestic">
                <span class="toggle-slider">
                    <span class="toggle-labels">仅国内</span>
                </span>
            </label>
            <label class="toggle-switch">
                <input type="checkbox" id="filterSector">
                <span class="toggle-slider">
                    <span class="toggle-labels">仅个股</span>
                </span>
            </label>
            <label class="toggle-switch">
                <input type="checkbox" id="filterBilingual">
                <span class="toggle-slider">
                    <span class="toggle-labels">仅双语</span>
                </span>
            </label>
            <label class="toggle-switch">
                <input type="checkbox" id="filterArchived">
                <span class="toggle-slider">
                    <span class="toggle-labels">仅归档</span>
                </span>
            </label>
        </div>
    </div>
</div>

<!-- Overview -->
<div class="workbench-overview fade-in">
    <div class="overview-grid">
        <div class="overview-card cyan">
            <i class="bi bi-file-text"></i>
            <div>
                <div class="overview-value" id="totalReports">-</div>
                <div class="overview-label">研究总数</div>
            </div>
        </div>
        <div class="overview-card green">
            <i class="bi bi-globe2"></i>
            <div>
                <div class="overview-value" id="regionSplit">-</div>
                <div class="overview-label">国内 / 海外</div>
            </div>
        </div>
        <div class="overview-card gold">
            <i class="bi bi-clock-history"></i>
            <div>
                <div class="overview-value" id="bilingualCoverage">-</div>
                <div class="overview-label">双语覆盖</div>
            </div>
        </div>
        <div class="overview-card purple">
            <i class="bi bi-archive"></i>
            <div>
                <div class="overview-value" id="archivedCount">-</div>
                <div class="overview-label">原文归档</div>
            </div>
        </div>
    </div>
</div>

<!-- Workbench Layout -->
<div class="workbench-layout fade-in">
    <!-- List Panel -->
    <div class="list-panel" id="listPanel">
        <div class="list-header">
            <h2><i class="bi bi-list-ul"></i> 研究列表</h2>
            <div class="list-sort">
                <select class="form-select sort-select" id="sortSelect" onchange="applySort()">
                    <option value="date_desc">按时间降序</option>
                    <option value="date_asc">按时间升序</option>
                    <option value="title">按标题排序</option>
                </select>
            </div>
        </div>
        <div class="list-content" id="researchList">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Detail Panel -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <h2><i class="bi bi-file-earmark-text"></i> 详情</h2>
            <button class="btn btn-icon detail-close" onclick="closeDetail()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div class="detail-content" id="researchDetail">
            <div class="empty-detail">
                <i class="bi bi-layout-text-window-reverse"></i>
                <p>点击左侧列表查看研究报告详情</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}

{% block extra_js %}
<script>
    let researchData = [];
    let currentReportKey = null;
    let isLoadingList = false;
    const currentFilters = {
        focus: 'all',
        domesticOnly: false,
        companyOnly: false,
        bilingualOnly: false,
        archivedOnly: false,
        sort: 'date_desc',
    };
    const focusMap = {
        chip: '芯片半导体',
        ai: 'AI',
        robot: '机器人',
        biopharma: '创新药',
        solar: '光伏',
        nuclear: '核电',
        agri: '养猪',
    };

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function shortDate(value) {
        if (!value) return '-';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value).slice(0, 19);
        return date.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function relativeTime(value) {
        if (!value) return '';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '';
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMins / 60);
        const diffDays = Math.floor(diffHours / 24);
        if (diffMins < 1) return '刚刚';
        if (diffMins < 60) return `${diffMins} 分钟前`;
        if (diffHours < 24) return `${diffHours} 小时前`;
        if (diffDays === 1) return '昨天';
        if (diffDays < 7) return `${diffDays} 天前`;
        return shortDate(value);
    }

    function pickReportTime(item) {
        return item.sort_time || item.published_at || item.fetched_at || item.updated_at || item.created_at || '';
    }

    function getReportSummary(item) {
        return item.display_summary || item.summary_zh || item.summary || item.thesis_zh || item.thesis || '';
    }

    function normalizeKeyPoints(points) {
        if (!points) return [];
        if (Array.isArray(points)) return points;
        if (typeof points === 'string') {
            return points
                .split(/\r?\n|；|;/)
                .map((part) => part.trim())
                .filter(Boolean)
                .map((part) => ({ zh: part }));
        }
        return [];
    }

    function toggleFilters() {
        const panel = document.getElementById('filterBar');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function emptyDetailHtml(message = '点击左侧列表查看研究报告详情') {
        return `
            <div class="empty-detail">
                <i class="bi bi-layout-text-window-reverse"></i>
                <p>${escapeHtml(message)}</p>
            </div>
        `;
    }

    function buildListUrl() {
        const params = new URLSearchParams({ limit: '180' });
        if (currentFilters.focus !== 'all') params.set('focus_area', focusMap[currentFilters.focus]);
        if (currentFilters.domesticOnly) params.set('publisher_region', 'domestic');
        if (currentFilters.companyOnly) params.set('target_scope', 'company');
        if (currentFilters.bilingualOnly) params.set('bilingual_only', 'true');
        if (currentFilters.archivedOnly) params.set('archived_only', 'true');
        return `/investment/api/research/list?${params.toString()}`;
    }

    function sortReports(items) {
        const rows = [...items];
        rows.sort((a, b) => {
            const aDate = new Date(pickReportTime(a) || 0).getTime();
            const bDate = new Date(pickReportTime(b) || 0).getTime();
            if (currentFilters.sort === 'date_asc') return aDate - bDate;
            if (currentFilters.sort === 'title') return String(a.display_title || a.title || '').localeCompare(String(b.display_title || b.title || ''), 'zh-CN');
            return bDate - aDate;
        });
        return rows;
    }

    async function refreshData(button = null) {
        if (button) {
            button.disabled = true;
            button.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span>';
        }
        try {
            await Promise.all([loadWorkbenchOverview(), loadResearchList()]);
            showToast('研究工作台已刷新');
        } catch (error) {
            showToast(`刷新失败: ${error.message}`, 'error');
        } finally {
            if (button) {
                button.disabled = false;
                button.innerHTML = '<i class="bi bi-arrow-clockwise"></i><span>刷新</span>';
            }
        }
    }

    async function loadWorkbenchOverview() {
        const payload = await api('/investment/api/research/workbench');
        const summary = payload.summary || {};
        document.getElementById('totalReports').textContent = Number(summary.total_reports || 0).toLocaleString();
        document.getElementById('regionSplit').textContent = `${Number(summary.domestic_reports || 0)} / ${Number(summary.overseas_reports || 0)}`;
        document.getElementById('bilingualCoverage').textContent = `${Number(summary.bilingual_pct || 0).toFixed(1)}%`;
        document.getElementById('archivedCount').textContent = `${Number(summary.archived_reports || 0)} (${Number(summary.archived_pct || 0).toFixed(1)}%)`;
        const subtitle = document.querySelector('.page-subtitle');
        if (subtitle) {
            subtitle.textContent = summary.latest_updated_at
                ? `整合研究证据与内容仪表盘 · 最近更新 ${shortDate(summary.latest_updated_at)}`
                : '整合研究证据与内容仪表盘';
        }
    }

    async function loadResearchList() {
        if (isLoadingList) return;
        isLoadingList = true;
        const container = document.getElementById('researchList');
        container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        try {
            const payload = await api(buildListUrl());
            researchData = sortReports(payload.items || []);
            renderResearchList(researchData);
            if (researchData.length && !researchData.some(item => item.report_key === currentReportKey)) {
                currentReportKey = researchData[0].report_key;
                await loadResearchDetail(currentReportKey);
            } else if (!researchData.length) {
                closeDetail('当前筛选条件下暂无研究材料');
            }
        } catch (error) {
            container.innerHTML = `
                <div class="empty-list">
                    <i class="bi bi-exclamation-triangle"></i>
                    <p>研究列表读取失败：${escapeHtml(error.message)}</p>
                </div>
            `;
        } finally {
            isLoadingList = false;
        }
    }

    function reportMetaBadges(item) {
        const badges = [];
        badges.push(`<span><i class="bi bi-building"></i>${escapeHtml(item.source_name || item.source_key || '-')}</span>`);
        badges.push(`<span><i class="bi bi-globe2"></i>${item.publisher_region === 'domestic' ? '国内' : '海外'}</span>`);
        badges.push(`<span><i class="bi bi-diagram-3"></i>${item.target_scope === 'company' ? '个股' : item.target_scope === 'macro' ? '宏观' : item.target_scope === 'policy' ? '政策' : '行业'}</span>`);
        badges.push(`<span><i class="bi bi-file-earmark-text"></i>${escapeHtml(item.report_type || 'research')}</span>`);
        if (item.archived) badges.push('<span><i class="bi bi-archive"></i>已归档</span>');
        if (item.has_translation) badges.push('<span><i class="bi bi-translate"></i>双语</span>');
        const reportTime = pickReportTime(item);
        if (reportTime) badges.push(`<span><i class="bi bi-calendar"></i>${shortDate(reportTime)}</span>`);
        return badges.join('');
    }

    function renderResearchList(items) {
        const container = document.getElementById('researchList');
        if (!items.length) {
            container.innerHTML = `
                <div class="empty-list">
                    <i class="bi bi-inbox"></i>
                    <p>当前筛选条件下暂无研究材料</p>
                </div>
            `;
            return;
        }
        container.innerHTML = items.map((item, index) => `
            <div class="research-item fade-in ${currentReportKey === item.report_key ? 'active' : ''}" data-report-key="${escapeHtml(item.report_key)}" style="animation-delay:${index * 0.03}s;">
                <div class="research-item-header">
                    <div class="research-title">${escapeHtml(item.display_title || item.title || '-')}</div>
                    ${pickReportTime(item) ? `<div class="research-time-badge"><i class="bi bi-clock-history"></i>${escapeHtml(relativeTime(pickReportTime(item)))}</div>` : ''}
                </div>
                ${item.title_zh && item.title && item.title_zh !== item.title ? `<div class="en-line">${escapeHtml(item.title)}</div>` : ''}
                <div class="research-meta">${reportMetaBadges(item)}</div>
                <div class="research-meta" style="margin-top:0.6rem;">
                    ${(item.focus_areas || []).slice(0, 3).map(area => `<span><i class="bi bi-bookmark-star"></i>${escapeHtml(area)}</span>`).join('')}
                </div>
                <div class="detail-text" style="margin-top:0.75rem; font-size:0.84rem;">${escapeHtml(getReportSummary(item) || '摘要待补充')}</div>
                ${(item.thesis_zh || item.thesis) ? `<div class="research-thesis-preview">${escapeHtml(item.thesis_zh || item.thesis)}</div>` : ''}
                ${(item.key_points || []).length ? `
                    <div class="research-key-points">
                        ${(item.key_points || []).slice(0, 3).map((point) => `
                            <span class="key-point-tag">${escapeHtml(point.zh || point.en || '')}</span>
                        `).join('')}
                    </div>
                ` : ''}
            </div>
        `).join('');
        container.querySelectorAll('.research-item').forEach((row) => {
            row.addEventListener('click', async () => {
                currentReportKey = row.dataset.reportKey;
                container.querySelectorAll('.research-item').forEach((item) => item.classList.remove('active'));
                row.classList.add('active');
                await loadResearchDetail(currentReportKey);
            });
        });
    }

    function renderPoint(point) {
        if (typeof point === 'string') {
            return `<li style="margin-bottom:0.55rem;"><div>${escapeHtml(point)}</div></li>`;
        }
        const zh = point.zh ? `<div>${escapeHtml(point.zh)}</div>` : '';
        const en = point.en && point.en !== point.zh ? `<div class="en-line">${escapeHtml(point.en)}</div>` : '';
        return `<li style="margin-bottom:0.55rem;">${zh || `<div>${escapeHtml(point.en || '')}</div>`}${en}</li>`;
    }

    async function loadResearchDetail(reportKey) {
        const container = document.getElementById('researchDetail');
        container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        try {
            const report = await api(`/investment/api/research/${encodeURIComponent(reportKey)}`);
            const summaryText = report.summary_zh || report.summary || report.display_summary || '';
            const thesisText = report.thesis_zh || report.thesis || report.detail_intro || '';
            const relevanceText = report.relevance_zh || report.relevance || '';
            const keyPoints = normalizeKeyPoints(report.key_points);
            const focusPills = (report.focus_areas || []).map((area) => `<span class="detail-link" style="padding:0.45rem 0.7rem; display:inline-flex;">${escapeHtml(area)}</span>`).join('');
            const links = [];
            if (report.url) {
                links.push(`<a href="${escapeHtml(report.url)}" target="_blank" rel="noreferrer" class="detail-link"><i class="bi bi-box-arrow-up-right"></i> 来源页面</a>`);
            }
            if (report.original_url && report.original_url !== report.url) {
                links.push(`<a href="${escapeHtml(report.original_url)}" target="_blank" rel="noreferrer" class="detail-link"><i class="bi bi-file-earmark-arrow-down"></i> 原文链接</a>`);
            }
            if (report.archived) {
                links.push(`<a href="/investment/api/research/${encodeURIComponent(report.report_key)}/asset" class="detail-link"><i class="bi bi-archive"></i> Windows 归档原文</a>`);
            }
            container.innerHTML = `
                <h3 class="research-detail-title">${escapeHtml(report.display_title || report.title || '-')}</h3>
                ${report.title_zh && report.title && report.title_zh !== report.title ? `<div class="en-line" style="margin-bottom:1rem;">${escapeHtml(report.title)}</div>` : ''}

                <div class="detail-meta-grid">
                    <div class="detail-meta-item"><i class="bi bi-building"></i><span>${escapeHtml(report.source_name || report.source_key || '-')}</span></div>
                    <div class="detail-meta-item"><i class="bi bi-globe2"></i><span>${report.publisher_region === 'domestic' ? '国内' : '海外'}</span></div>
                    <div class="detail-meta-item"><i class="bi bi-diagram-3"></i><span>${report.target_scope === 'company' ? '个股' : report.target_scope === 'macro' ? '宏观' : report.target_scope === 'policy' ? '政策' : '行业'}</span></div>
                    <div class="detail-meta-item"><i class="bi bi-calendar"></i><span>${shortDate(pickReportTime(report))}</span></div>
                    <div class="detail-meta-item"><i class="bi bi-translate"></i><span>${report.has_translation ? '中英双语' : '原文为主'}</span></div>
                    <div class="detail-meta-item"><i class="bi bi-archive"></i><span>${escapeHtml(report.original_asset_status || 'pending')}</span></div>
                </div>

                ${focusPills ? `<div class="detail-section"><div style="display:flex; flex-wrap:wrap; gap:0.5rem;">${focusPills}</div></div>` : ''}

                ${links.length ? `<div class="detail-section"><h4 class="detail-section-title"><i class="bi bi-link-45deg"></i> 原文与归档</h4><div class="detail-links">${links.join('')}</div></div>` : ''}

                ${summaryText ? `
                    <div class="detail-section">
                        <h4 class="detail-section-title"><i class="bi bi-card-text"></i> 摘要</h4>
                        <div class="detail-text">${escapeHtml(summaryText)}</div>
                        ${report.summary && report.summary !== report.summary_zh ? `<div class="en-line" style="margin-top:0.6rem;">${escapeHtml(report.summary)}</div>` : ''}
                    </div>
                ` : ''}

                ${thesisText ? `
                    <div class="detail-section">
                        <h4 class="detail-section-title"><i class="bi bi-lightbulb"></i> Thesis</h4>
                        <div class="detail-text">${escapeHtml(thesisText)}</div>
                        ${report.thesis && report.thesis !== report.thesis_zh ? `<div class="en-line" style="margin-top:0.6rem;">${escapeHtml(report.thesis)}</div>` : ''}
                    </div>
                ` : ''}

                ${relevanceText ? `
                    <div class="detail-section">
                        <h4 class="detail-section-title"><i class="bi bi-diagram-2"></i> 投资关联</h4>
                        <div class="detail-text">${escapeHtml(relevanceText)}</div>
                        ${report.relevance && report.relevance !== report.relevance_zh ? `<div class="en-line" style="margin-top:0.6rem;">${escapeHtml(report.relevance)}</div>` : ''}
                    </div>
                ` : ''}

                ${keyPoints.length ? `
                    <div class="detail-section">
                        <h4 class="detail-section-title"><i class="bi bi-pin-angle"></i> 重点提炼</h4>
                        <ul style="padding-left:1.2rem; color:var(--text-secondary); line-height:1.6;">
                            ${keyPoints.map(renderPoint).join('')}
                        </ul>
                    </div>
                ` : `
                    <div class="detail-section">
                        <h4 class="detail-section-title"><i class="bi bi-pin-angle"></i> 重点提炼</h4>
                        <div class="detail-text">暂无结构化 key points，已保留摘要与原文链接供快速阅读。</div>
                    </div>
                `}

                <div class="detail-section">
                    <h4 class="detail-section-title"><i class="bi bi-check-circle"></i> 证据项</h4>
                    ${(report.evidence || []).length ? `
                        <div class="detail-text">
                            ${(report.evidence || []).map((item) => `
                                <div style="padding:0.65rem 0; border-bottom:1px solid var(--border-color);">
                                    <div style="font-weight:600;">${escapeHtml(item.label || '-')}</div>
                                    <div style="margin-top:0.25rem;">${escapeHtml(item.value || '')}</div>
                                    ${item.source_url ? `<div class="en-line" style="margin-top:0.35rem;"><a href="${escapeHtml(item.source_url)}" target="_blank" rel="noreferrer">${escapeHtml(item.source_url)}</a></div>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    ` : '<div class="detail-text">暂无结构化证据项。</div>'}
                </div>
            `;
        } catch (error) {
            container.innerHTML = emptyDetailHtml(`详情读取失败：${error.message}`);
        }
    }

    function closeDetail(message = '点击左侧列表查看研究报告详情') {
        currentReportKey = null;
        document.querySelectorAll('.research-item').forEach((item) => item.classList.remove('active'));
        document.getElementById('researchDetail').innerHTML = emptyDetailHtml(message);
    }

    document.querySelectorAll('.filter-tag').forEach((button) => {
        button.addEventListener('click', async () => {
            document.querySelectorAll('.filter-tag').forEach((item) => item.classList.remove('active'));
            button.classList.add('active');
            currentFilters.focus = button.dataset.key || 'all';
            await loadResearchList();
        });
    });
    document.getElementById('filterDomestic').addEventListener('change', async (event) => {
        currentFilters.domesticOnly = Boolean(event.target.checked);
        await loadResearchList();
    });
    document.getElementById('filterSector').addEventListener('change', async (event) => {
        currentFilters.companyOnly = Boolean(event.target.checked);
        await loadResearchList();
    });
    document.getElementById('filterBilingual').addEventListener('change', async (event) => {
        currentFilters.bilingualOnly = Boolean(event.target.checked);
        await loadResearchList();
    });
    document.getElementById('filterArchived').addEventListener('change', async (event) => {
        currentFilters.archivedOnly = Boolean(event.target.checked);
        await loadResearchList();
    });
    document.getElementById('sortSelect').addEventListener('change', async (event) => {
        currentFilters.sort = event.target.value;
        researchData = sortReports(researchData);
        renderResearchList(researchData);
    });
    document.querySelector('.workbench-actions .btn-primary').addEventListener('click', async (event) => {
        await refreshData(event.currentTarget);
    });

    document.addEventListener('DOMContentLoaded', async () => {
        await loadWorkbenchOverview();
        await loadResearchList();
    });
</script>
{% endblock %}
