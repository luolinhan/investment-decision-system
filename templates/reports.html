{% extends "base.html" %}

{% block title %}研报列表 - 研报中心{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">研报列表</h1>
        <p class="page-subtitle">浏览和搜索全部研报数据</p>
    </div>
    <div style="display: flex; gap: 0.75rem;">
        <button class="btn btn-secondary" onclick="toggleFilters()">
            <i class="bi bi-funnel"></i>
            <span>筛选</span>
        </button>
        <button class="btn btn-primary" onclick="collectAll()">
            <i class="bi bi-arrow-repeat"></i>
            <span>采集</span>
        </button>
    </div>
</div>

<!-- Filter Panel -->
<div class="filter-panel fade-in" id="filterPanel" style="display: none;">
    <div class="filter-row">
        <div>
            <label class="form-label">关键词搜索</label>
            <input type="text" class="form-control" id="filterKeyword" placeholder="输入研报标题、股票名...">
        </div>
        <div>
            <label class="form-label">股票</label>
            <select class="form-select" id="filterStock">
                <option value="">全部股票</option>
            </select>
        </div>
        <div>
            <label class="form-label">机构</label>
            <input type="text" class="form-control" id="filterInstitution" placeholder="机构名称">
        </div>
        <div>
            <label class="form-label">开始日期</label>
            <input type="date" class="form-control" id="filterStartDate">
        </div>
        <div>
            <label class="form-label">结束日期</label>
            <input type="date" class="form-control" id="filterEndDate">
        </div>
        <div>
            <label class="form-label">&nbsp;</label>
            <button class="btn btn-primary" style="width: 100%;" onclick="applyFilters()">
                <i class="bi bi-search"></i>
            </button>
        </div>
    </div>
</div>

<!-- Results Info -->
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <div style="color: var(--text-secondary); font-size: 0.9rem;">
        共 <span id="totalCount" style="color: var(--accent-cyan); font-weight: 600;">-</span> 条研报
    </div>
    <div>
        <select class="form-select" id="pageSize" style="width: auto; padding: 0.5rem 2rem 0.5rem 1rem;" onchange="changePageSize()">
            <option value="20">每页 20 条</option>
            <option value="50">每页 50 条</option>
            <option value="100">每页 100 条</option>
        </select>
    </div>
</div>

<!-- Report List -->
<div id="reportList">
    <div class="loading">
        <div class="spinner"></div>
    </div>
</div>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;
    let pageSize = 20;
    let filters = {
        stock_code: '{{ stock_code or "" }}',
        institution: '{{ institution or "" }}',
        keyword: '',
        start_date: '',
        end_date: ''
    };

    function toggleFilters() {
        const panel = document.getElementById('filterPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function applyFilters() {
        filters.keyword = document.getElementById('filterKeyword').value;
        filters.stock_code = document.getElementById('filterStock').value;
        filters.institution = document.getElementById('filterInstitution').value;
        filters.start_date = document.getElementById('filterStartDate').value;
        filters.end_date = document.getElementById('filterEndDate').value;
        currentPage = 1;
        loadReports();
    }

    function changePageSize() {
        pageSize = parseInt(document.getElementById('pageSize').value);
        currentPage = 1;
        loadReports();
    }

    async function loadStocks() {
        try {
            const data = await api('/api/reports/stocks/list');
            const select = document.getElementById('filterStock');
            data.stocks.forEach(stock => {
                const option = document.createElement('option');
                option.value = stock.code;
                option.textContent = `${stock.name} (${stock.code})`;
                select.appendChild(option);
            });
            if (filters.stock_code) {
                select.value = filters.stock_code;
            }
        } catch (error) {
            console.error('Load stocks failed:', error);
        }
    }

    async function loadReports() {
        const params = new URLSearchParams({
            page: currentPage,
            page_size: pageSize
        });

        if (filters.keyword) params.append('keyword', filters.keyword);
        if (filters.stock_code) params.append('stock_code', filters.stock_code);
        if (filters.institution) params.append('institution', filters.institution);
        if (filters.start_date) params.append('start_date', filters.start_date);
        if (filters.end_date) params.append('end_date', filters.end_date);

        try {
            const data = await api(`/api/reports?${params}`);
            document.getElementById('totalCount').textContent = data.total.toLocaleString();

            if (data.reports.length === 0) {
                document.getElementById('reportList').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>暂无研报数据</p>
                        <button class="btn btn-primary" onclick="collectAll()">立即采集</button>
                    </div>
                `;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const html = data.reports.map((report, index) => `
                <div class="report-card fade-in" style="animation-delay: ${index * 0.05}s;" onclick="location.href='/report/${report.id}'">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div style="flex: 1; min-width: 0;">
                            <div class="report-title">${report.title}</div>
                            <div class="report-meta">
                                ${report.stock_name ? `<span><i class="bi bi-graph-up"></i>${report.stock_name}</span>` : ''}
                                ${report.institution ? `<span><i class="bi bi-building"></i>${report.institution}</span>` : ''}
                                ${report.publish_date ? `<span><i class="bi bi-calendar"></i>${formatFullDate(report.publish_date)}</span>` : ''}
                            </div>
                        </div>
                        <div style="margin-left: 1rem; display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem;">
                            ${report.rating ? `<span class="badge-rating ${getRatingClass(report.rating)}">${report.rating}</span>` : ''}
                            ${report.local_pdf_path ? '<i class="bi bi-file-pdf-fill" style="color: var(--accent-red); font-size: 1.1rem;"></i>' : '<i class="bi bi-file-earmark" style="color: var(--text-muted);"></i>'}
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('reportList').innerHTML = html;
            renderPagination(data.total, data.page);

        } catch (error) {
            console.error('Load reports failed:', error);
            document.getElementById('reportList').innerHTML = `
                <div style="text-align: center; padding: 3rem; color: var(--accent-red);">
                    <i class="bi bi-exclamation-triangle" style="font-size: 2rem;"></i>
                    <p style="margin-top: 1rem;">加载失败: ${error.message}</p>
                </div>
            `;
        }
    }

    function renderPagination(total, current) {
        const totalPages = Math.ceil(total / pageSize);
        if (totalPages <= 1) {
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        let html = '';

        // Previous
        html += `<a class="page-link ${current === 1 ? 'disabled' : ''}" onclick="goToPage(${current - 1}); return false;">
            <i class="bi bi-chevron-left"></i>
        </a>`;

        // Pages
        const start = Math.max(1, current - 2);
        const end = Math.min(totalPages, current + 2);

        if (start > 1) {
            html += `<a class="page-link" onclick="goToPage(1); return false;">1</a>`;
            if (start > 2) html += `<span class="page-link disabled">...</span>`;
        }

        for (let i = start; i <= end; i++) {
            html += `<a class="page-link ${i === current ? 'active' : ''}" onclick="goToPage(${i}); return false;">${i}</a>`;
        }

        if (end < totalPages) {
            if (end < totalPages - 1) html += `<span class="page-link disabled">...</span>`;
            html += `<a class="page-link" onclick="goToPage(${totalPages}); return false;">${totalPages}</a>`;
        }

        // Next
        html += `<a class="page-link ${current === totalPages ? 'disabled' : ''}" onclick="goToPage(${current + 1}); return false;">
            <i class="bi bi-chevron-right"></i>
        </a>`;

        document.getElementById('pagination').innerHTML = html;
    }

    function goToPage(page) {
        if (page < 1) return;
        currentPage = page;
        loadReports();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function collectAll() {
        const btn = event.target.closest('.btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner" style="width: 16px; height: 16px; border-width: 2px;"></span><span>采集中...</span>';

        try {
            const result = await api('/api/reports/collect', {
                method: 'POST',
                body: JSON.stringify({ days: 30 })
            });

            if (result.success) {
                showToast(result.message);
                setTimeout(loadReports, 1000);
            } else {
                showToast(result.message, 'error');
            }
        } catch (error) {
            showToast('采集失败: ' + error.message, 'error');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-arrow-repeat"></i><span>采集</span>';
    }

    // Initialize
    loadStocks();
    loadReports();

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            document.getElementById('filterKeyword').focus();
        }
    });
</script>
{% endblock %}
